name: namecoin_resolver_test

on:
  push

jobs:
  tests:
    runs-on:
      group: runners_v1
    steps:
      - name: Use Go = 1.23
        uses: actions/setup-go@v3
        with:
          go-version: '=1.23'
        id: go

      - name: Check out code into the Go module directory
        uses: actions/checkout@v3

      # Install gotestfmt on the VM running the action.
      - name: Set up gotestfmt
        uses: gotesttools/gotestfmt-action@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create temp directory
        run: |
          mkdir -p ./${{ github.run_attempt }}

      # Run Namecoin resolver unit tests with nice formatting
      - name: Run Namecoin resolver unit tests
        run: |
          set -euo pipefail
          go test -json -timeout 5m -v -race -run 'TestNamecoinDNS' ./peer/tests/unit 2>&1 | tee ./${{ github.run_attempt }}/gotest-namecoin-resolver-unit.log | gotestfmt

      # Upload formatted logs
      - name: Upload Namecoin resolver unit test log
        uses: actions/upload-artifact@v4
        with:
          name: namecoin-resolver-unit-test-log
          path: ./${{ github.run_attempt }}/gotest-namecoin-resolver-unit.log
          if-no-files-found: error
